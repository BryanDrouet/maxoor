<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patch Notes | Maxoor Inc.</title>
    <meta name="description" content="Historique des mises a jour du site Maxoor Inc.">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://maxoor.bryan.ovh/patch-note/">
    <link rel="icon" type="image/svg+xml" href="/assets/images/logo.svg" sizes="any">
    <link rel="apple-touch-icon" href="/assets/images/logo.svg">

    <script>
        const isLoaderDebug = new URLSearchParams(window.location.search).get('debug') === 'true';
        document.documentElement.classList.add('is-loading');
        if (isLoaderDebug) {
            document.documentElement.classList.add('is-loading-debug');
        }

        const clearLoadingState = () => {
            document.documentElement.classList.remove('is-loading');
            document.documentElement.classList.remove('is-loading-debug');
        };

        if (!isLoaderDebug) {
            window.addEventListener('load', clearLoadingState, { once: true, passive: true });
            window.addEventListener('pageshow', clearLoadingState, { once: true, passive: true });
            setTimeout(clearLoadingState, 5000);
        }
    </script>

    <script src="/js/cache-assets.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Chivo+Mono:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="/js/modules/layout.js" defer></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body>
    <div id="page-loader" class="page-loader" aria-live="polite" aria-label="Chargement de la page">
        <div class="page-loader__text">CHARGEMENT EN COURS...</div>
        <div class="page-loader__spinner" aria-hidden="true"></div>
    </div>
    <header data-shared-header="simple"></header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Patch Notes</h1>
                <h2>Updates du site Maxoor</h2>
                <p>Tous les changements ne seront pas notes ici (par exemple les micro-ajustements visuels), mais les updates importantes sont regroupees sur cette page.</p>
            </div>
            <div class="hero-image">
                <img src="/assets/images/logo.svg" alt="Logo Maxoor" loading="eager" fetchpriority="high" decoding="async" width="320" height="320">
            </div>
        </section>

        <section class="product-info-section" id="patch-note">
            <div class="section-header">
                <h2>Historique des mises a jour</h2>
            </div>
            <div class="product-info-content" style="grid-template-columns: repeat(1, 1fr);">
                <article class="info-card reveal active">
                    <div class="markdown-content" data-markdown-src="patch-note.md"></div>
                </article>
            </div>
        </section>
    </main>

    <footer data-shared-footer="true"></footer>
</body>
</html>
